services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tabernacle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tabernacle}
      POSTGRES_DB: ${POSTGRES_DB:-tabernacle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tabernacle} -d ${POSTGRES_DB:-tabernacle}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    image: tabernacle-erp:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3847
      TABERNACLE_DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-}
      WEB_DIST_DIR: /app/apps/desktop/dist
      DOMAIN: ${DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - tabernacle_data:/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    expose:
      - "3847"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3847/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  # Accès direct sans HTTPS (tests / IP publique sans domaine)
  app-direct:
    profiles: ["direct"]
    build: .
    image: tabernacle-erp:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3847
      TABERNACLE_DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-}
      WEB_DIST_DIR: /app/apps/desktop/dist
      DOMAIN: ${DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - tabernacle_data:/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    ports:
      - "${APP_PORT:-3847}:3847"

  # HTTPS public (production VM avec nom de domaine)
  caddy:
    profiles: ["production"]
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  tabernacle_data:
  postgres_data:
  caddy_data:
  caddy_config:
