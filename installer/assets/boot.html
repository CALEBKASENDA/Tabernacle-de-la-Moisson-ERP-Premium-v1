<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabernacle de la Moisson ERP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e3a5f 100%);
      color: #f8fafc;
    }
    .card {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 420px;
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.25rem;
      border-radius: 16px;
      background: #fff1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }
    p { margin: 0; opacity: 0.85; line-height: 1.5; }
    .spinner {
      width: 36px;
      height: 36px;
      margin: 1.5rem auto 0;
      border: 3px solid #ffffff33;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #fca5a5; margin-top: 1rem; font-size: 0.95rem; }
    a { color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" aria-hidden="true">⛪</div>
    <h1>Tabernacle de la Moisson ERP</h1>
    <p>Ouverture de l'application…</p>
    <div class="spinner" aria-label="Chargement"></div>
    <p id="status" class="error" hidden></p>
  </div>
  <script>
    const API = 'http://127.0.0.1:3847/health';
    const APP = 'http://127.0.0.1:3847/';
    (async function waitForServer() {
      for (let i = 0; i < 160; i++) {
        try {
          const res = await fetch(API, { cache: 'no-store' });
          const data = await res.json();
          if (data && data.status === 'ok') {
            location.replace(APP);
            return;
          }
        } catch (_) { /* serveur pas encore pret */ }
        await new Promise((r) => setTimeout(r, 200));
      }
      const el = document.getElementById('status');
      el.hidden = false;
      el.innerHTML = 'Le démarrage prend plus de temps que prévu. <a href="' + APP + '">Cliquez ici pour ouvrir l\'ERP</a>.';
    })();
  </script>
</body>
</html>
